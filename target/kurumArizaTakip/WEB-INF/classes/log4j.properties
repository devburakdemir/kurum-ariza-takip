status = warn
monitorInterval = 30

# Console Appender
appender.console.type = Console
appender.console.name = Console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# File Appender
appender.file.type = RollingFile
appender.file.name = File
appender.file.fileName = logs/ariza-takip.log
appender.file.filePattern = logs/ariza-takip-%d{yyyy-MM-dd}-%i.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.file.policies.type = Policies
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 10 MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 10

# Logger for org.example
logger.org_example.name = org.example
logger.org_example.level = debug
logger.org_example.additivity = false
logger.org_example.appenderRefs = console, file
logger.org_example.appenderRef.console.ref = Console
logger.org_example.appenderRef.file.ref = File

# Logger for Hibernate
logger.hibernate.name = org.hibernate
logger.hibernate.level = warn

# Logger for Spring
logger.spring.name = org.springframework
logger.spring.level = info

# Root Logger
rootLogger.level = warn
rootLogger.appenderRefs = console
rootLogger.appenderRef.console.ref = Console
